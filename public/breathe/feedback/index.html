<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback | Breathe Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --primary: #2C7873;
            --secondary: #52AB98;
            --accent: #E07B39;
            --text-main: #FFFFFF;
            --text-muted: #A0A0A0;
            --card-border: rgba(255, 255, 255, 0.08);
            --card-bg: rgba(255, 255, 255, 0.03);
            --input-bg: rgba(255, 255, 255, 0.05);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            letter-spacing: 0.02em;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .nav {
            padding: 2rem 1.5rem;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }
        .nav a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            font-size: 1.1rem;
            transition: color 0.3s ease;
        }
        .nav a:hover { color: var(--secondary); }
        
        .feedback-container {
            flex: 1;
            padding: 2rem 1.5rem 8rem 1.5rem;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }
        
        h1 { font-size: clamp(2rem, 5vw, 3rem); font-weight: 300; margin-bottom: 0.5rem; }
        .subtitle { color: var(--text-muted); font-weight: 300; margin-bottom: 3rem; }

        .form-group { margin-bottom: 2rem; }
        label { display: block; margin-bottom: 0.75rem; font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
        
        .category-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-bottom: 2rem; }
        .category-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 0.75rem;
            border-radius: 12px;
            color: var(--text-muted);
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s ease;
            text-align: center;
        }
        .category-btn:hover { border-color: var(--secondary); color: var(--text-main); }
        .category-btn.active { background: var(--secondary); color: var(--bg); border-color: var(--secondary); font-weight: 500; }

        .type-input, .text-input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 1rem;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s ease;
        }
        .type-input:focus, .text-input:focus { border-color: var(--secondary); }
        textarea.text-input { min-height: 150px; resize: vertical; }

        .platform-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 0.4rem 0.8rem;
            border-radius: 100px;
            font-size: 0.8rem;
            color: var(--secondary);
            margin-bottom: 1.5rem;
        }

        .btn-submit {
            width: 100%;
            background: var(--text-main);
            color: var(--bg);
            padding: 1.2rem;
            border-radius: 100px;
            border: none;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,255,255,0.1); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .honeypot { display: none !important; }

        .success-state {
            display: none;
            text-align: center;
            padding: 4rem 0;
        }
        .success-icon { font-size: 4rem; color: var(--secondary); margin-bottom: 1.5rem; }
        .success-state h2 { font-weight: 300; margin-bottom: 1rem; }
        .success-state p { color: var(--text-muted); margin-bottom: 2rem; }

        footer { text-align: center; padding: 4rem 1.5rem; border-top: 1px solid var(--card-border); color: var(--text-muted); font-size: 0.9rem; margin-top: auto; }
        footer a { color: var(--secondary); text-decoration: none; margin: 0 0.5rem; }
        @media (max-width: 500px) {
            .feedback-container { padding: 1.5rem 1rem 4rem 1rem; }
            .category-grid { grid-template-columns: 1fr; }
            h1 { font-size: 1.8rem; }
            .subtitle { margin-bottom: 2rem; }
        }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/">&larr; Back</a>
    </div>

    <section class="feedback-container">
        <div id="form-state">
            <h1>Feedback</h1>
            <p class="subtitle">Help me make Breathe Collection better.</p>

            <div id="platform-info" class="platform-badge">Detecting platform...</div>

            <form id="feedback-form">
                <!-- Honeypot -->
                <input type="text" name="phone_number" class="honeypot" tabindex="-1" autocomplete="off">
                
                <label>What's on your mind?</label>
                <div class="category-grid">
                    <button type="button" class="category-btn" data-category="bug">Bug</button>
                    <button type="button" class="category-btn" data-category="idea">Idea</button>
                    <button type="button" class="category-btn" data-category="other">Other</button>
                </div>
                <input type="hidden" name="category" id="category-input" value="other">

                <div class="form-group">
                    <label>Email (optional, if you'd like a reply)</label>
                    <input type="email" name="email" class="type-input" placeholder="your@email.com" id="email-field">
                </div>

                <div class="form-group">
                    <label>Message</label>
                    <textarea name="message" class="text-input" placeholder="Tell me everything..." required id="message-field"></textarea>
                </div>

                <button type="submit" class="btn-submit" id="submit-btn">Send Feedback</button>
            </form>
        </div>

        <div id="success-state" class="success-state">
            <div class="success-icon">✓</div>
            <h2>Sent.</h2>
            <p>I've received your feedback and will take a look. Thank you for your support.</p>
            <a href="/" class="btn-submit" style="display: inline-block; width: auto; padding: 1rem 2rem; text-decoration: none;">Return Home</a>
        </div>
    </section>

    <footer>
        <p>&copy; Breathe Collection. </p>
    </footer>

    <script>
        const form = document.getElementById('feedback-form');
        const platformInfo = document.getElementById('platform-info');
        const categoryBtns = document.querySelectorAll('.category-btn');
        const categoryInput = document.getElementById('category-input');
        const emailField = document.getElementById('email-field');
        const messageField = document.getElementById('message-field');

        // 1. Detect Platform & Version
        const params = new URLSearchParams(window.location.search);
        let os = params.get('os');
        let version = params.get('v');
        let tier = params.get('tier');

        if (!os) {
            const ua = navigator.userAgent;
            if (/android/i.test(ua)) os = 'Android';
            else if (/iPad|iPhone|iPod/.test(ua)) os = 'iOS';
            else os = 'Desktop';
        }

        platformInfo.textContent = `${os}${version ? ' v' + version : ''}${tier ? ' • ' + tier : ''}`;

        // 2. Draft Saving
        emailField.value = localStorage.getItem('fb_email') || '';
        messageField.value = localStorage.getItem('fb_msg') || '';

        emailField.addEventListener('input', () => localStorage.setItem('fb_email', emailField.value));
        messageField.addEventListener('input', () => localStorage.setItem('fb_msg', messageField.value));

        // 3. Category Toggle
        categoryBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                categoryBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                categoryInput.value = btn.dataset.category;
            });
        });

        // 4. Form Submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';

            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            
            // Add metadata
            data.os = os;
            data.version = version;
            data.tier = tier;
            data.ua = navigator.userAgent;

            try {
                const response = await fetch('/api/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    localStorage.removeItem('fb_msg');
                    document.getElementById('form-state').style.display = 'none';
                    document.getElementById('success-state').style.display = 'block';
                } else {
                    alert('Something went wrong. Please try again.');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Send Feedback';
                }
            } catch (error) {
                alert('Connection error. Please try again.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Feedback';
            }
        });
    </script>
</body>
</html>
